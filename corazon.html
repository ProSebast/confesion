<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="corazon.css">
    <title>Corazón Vibrante</title>
    <style>
        #textBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.12);
            z-index: 1;
            line-height: 1.2;
            letter-spacing: -0.5px;
            word-wrap: break-word;
            overflow: hidden;
            pointer-events: none;
            user-select: none;
            text-align: center;
            padding: 10px;
        }

        .floating-heart {
            position: fixed;
            bottom: -50px;
            color: rgba(242, 0, 68, 0.5);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 3;
            animation: floatUpRandom linear forwards;
        }

        @keyframes floatUpRandom {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-110vh) translateX(var(--randomX)) rotate(var(--randomRotate));
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="textBackground"></div>

    <div class="heart">
        <p>Me gustas… ¿te gustaría intentar algo conmigo?</p>
    </div>

    <div id="choiceContainer">
        <button id="btnYes" class="choiceBtn">Sí</button>
        <button id="btnNo" class="choiceBtn">No</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.3.1/dist/confetti.browser.min.js"></script>

    <script>
        const words = ['I\'M YOURS', 'LOVE YOU', 'ADORE YOU', 'FOREVER', 'COMPLETE', 'WHOLE', 'BLESSED', 'AMAZING', 'BEAUTIFUL', 'SMILE', 'LAUGH', 'PERFECT', 'ALWAYS'];
        const bgDiv = document.getElementById('textBackground');
        let fullText = '';
        for (let i = 0; i < 4000; i++) {
            fullText += words[Math.floor(Math.random() * words.length)] + ' ';
        }

        let charIdx = 0;
        const step = 4; // Un poco más de caracteres por vez
        function deployText() {
            if (charIdx < fullText.length) {
                bgDiv.textContent += fullText.slice(charIdx, charIdx + step);
                charIdx += step;
                bgDiv.scrollTop = bgDiv.scrollHeight;
                setTimeout(deployText, 25); // Más rápido (25ms en lugar de 50ms)
            }
        }
        deployText();

        function createParticle() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            
            const randomX = (Math.random() - 0.5) * 200; 
            const randomRotate = (Math.random() - 0.5) * 360; 
            const duration = 10 + Math.random() * 5; 
            
            heart.style.setProperty('--randomX', randomX + 'px');
            heart.style.setProperty('--randomRotate', randomRotate + 'deg');
            heart.style.animationDuration = duration + 's';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }
        setInterval(createParticle, 1000);

        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        let yesScale = 1;

        function moveButtonRandom() {
            const padding = 20;
            const maxX = window.innerWidth - btnNo.offsetWidth - padding;
            const maxY = window.innerHeight - btnNo.offsetHeight - padding;
            const x = Math.max(padding, Math.random() * maxX);
            const y = Math.max(padding, Math.random() * maxY);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';

            yesScale += 0.15;
            btnYes.style.transform = `scale(${yesScale})`;
        }

        btnNo.addEventListener('mouseenter', moveButtonRandom);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButtonRandom();
        });

        btnYes.addEventListener('click', () => {
            document.body.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#1a1a2e;color:#fff;text-align:center;font-family:'Poppins', sans-serif;">
                    <p style="font-size:1.8rem;padding:20px;">Jeje sabía que dirías que sí. ❤️</p>
                    <img src="peach-and-goma-peach.gif" alt="peach" style="max-width:80vw;width:300px;border-radius:20px;" />
                </div>
            `;
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
        });
    </script>
</body>
</html>
